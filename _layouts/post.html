---
layout: default
---

<main class="post">
  <a class="back-link" href="{{ '/#blog' | relative_url }}">&larr; Back to blog</a>
  <article>
    <header class="post__header">
      <p class="eyebrow">Blog</p>
      <h1>{{ page.title }}</h1>
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d %b %Y" }}</time>
      {% if page.excerpt %}
        <p>{{ page.excerpt }}</p>
      {% endif %}
    </header>
    <div class="post__content">
      {{ content }}
    </div>
  </article>
</main>
